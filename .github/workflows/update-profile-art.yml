name: Update contribution ledger

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - name: Fetch contributions (public HTML, no token)
        run: python scripts/fetch_contributions.py "${{ github.repository_owner }}"
      - name: Render aged-paper ledger SVGs
        run: python scripts/render_heatmap_svg.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution ledger [skip ci]"
          file_pattern: "data/contributions.json heatmap-dark.svg heatmap-light.svg"
