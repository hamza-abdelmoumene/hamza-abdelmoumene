name: Generate Snake Animation

on:
  # run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # let you trigger it by hand from the Actions tab
  workflow_dispatch:
  # also run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake images
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=#22d3ee&color_dots=#161b22,#0e7490,#22d3ee,#7c3aed,#a78bfa

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
