name: Generate Snake Animation

on:
  # run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # let you trigger it by hand from the Actions tab
  workflow_dispatch:
  # also run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake images (aged-paper palette)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Two paper stocks (transparent bg) to match the hero banner + ledger.
          # dots run empty-paper -> pale sepia -> oxblood-espresso; snake is oxblood ink.
          outputs: |
            dist/snake-vellum.svg?color_snake=%239a4436&color_dots=%23cbbfa6,%23cbb185,%23be9450,%2395622c,%236e3a20
            dist/snake-bond.svg?color_snake=%239c4436&color_dots=%23dbd1b8,%23d6c08f,%23c4994f,%2399652d,%23732f22

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
