name: Generate Snake Animation

on:
  # run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # let you trigger it by hand from the Actions tab
  workflow_dispatch:
  # also run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake images
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-tokyonight.gif?color_snake=#7aa2f7&color_dots=#1a1b26,#283457,#3d59a1,#7aa2f7,#bb9af7

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
